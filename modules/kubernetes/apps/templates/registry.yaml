apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: registry
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.argocd.source.repoURL | quote }}
    path: "registry/clusters/{{ .Values.clusterName }}"
    targetRevision: {{ .Values.argocd.source.targetRevision | quote }}
  destination:
    server: {{ .Values.argocd.destination.server | quote }}
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        maxDuration: 5m0s
        factor: 2
